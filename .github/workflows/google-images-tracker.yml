name: Google Images tracker

on:
  schedule:
    - cron: '0 7 * * *'  # daily 07:00 UTC
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Track Google Images pickup
        env:
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          REPORT_DIR: ./og-tracking
        run: |
          if [ -z "$SERPAPI_API_KEY" ]; then
            echo "SERPAPI_API_KEY secret not configured — skipping."
            exit 0
          fi
          mkdir -p "$REPORT_DIR"
          node scripts/track-google-images.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: og-tracking-${{ github.run_id }}
          path: og-tracking/*.json
          if-no-files-found: ignore
