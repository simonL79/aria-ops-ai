name: Dependency Audit

# Proactive supply-chain alerting: runs weekly and on every dependency change.
# Fails (and therefore surfaces an alert/notification) when a high or critical
# severity advisory is found, so upstream fixes can be applied promptly.
on:
  schedule:
    - cron: "0 7 * * 1" # Mondays 07:00 UTC
  push:
    paths:
      - "package.json"
      - "package-lock.json"
      - "bun.lockb"
  pull_request:
    paths:
      - "package.json"
      - "package-lock.json"
      - "bun.lockb"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies (no scripts)
        run: npm ci --ignore-scripts

      # Capture the audit result without aborting the job, so we can post a
      # Slack alert and GitHub issue before failing the run.
      - name: Audit (high + critical only)
        id: audit
        run: |
          set +e
          JSON_REPORT="$(npm audit --json --audit-level=high 2>/dev/null)"
          TEXT_REPORT="$(npm audit --audit-level=high 2>&1)"
          STATUS=$?
          echo "$TEXT_REPORT"

          # Extract a concise, specific list of vulnerable packages and versions
          # from the JSON audit output for Slack/GitHub issue notifications.
          VULN_LIST="$(echo "$JSON_REPORT" | jq -r '
            .vulnerabilities // {}
            | to_entries
            | map(.value)
            | map(
                "• \(.name) (affected: \(.range)) — \(.severity | ascii_upcase)" +
                (if (.via | type) == "array" and (.via[0] | type) == "object"
                 then " — \(.via[0].title) — <\(.via[0].url)>"
                 else "" end)
              )
            | join("\n")
          ')"

          # Build a stable fingerprint of the unique vulnerability set so the
          # workflow can deduplicate: identical sets produce the same hash
          # regardless of run, ordering, or transient report formatting.
          FINGERPRINT="$(echo "$JSON_REPORT" | jq -S -r '
            .vulnerabilities // {}
            | to_entries
            | map({
                name: .value.name,
                severity: .value.severity,
                range: .value.range
              })
            | sort_by(.name, .severity, .range)
          ' | sha256sum | cut -d" " -f1)"
          echo "fingerprint=$FINGERPRINT" >> "$GITHUB_OUTPUT"

          # Persist a trimmed text report and the vulnerable package list.
          {
            echo "report<<EOF"
            echo "$TEXT_REPORT" | tail -n 40
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          {
            echo "vuln_list<<EOF"
            echo "$VULN_LIST"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          # Machine-readable, newline-separated list of vulnerable package
          # names so downstream steps can match them against Dependabot PRs.
          VULN_PACKAGES="$(echo "$JSON_REPORT" | jq -r '
            .vulnerabilities // {}
            | keys
            | .[]
          ')"
          {
            echo "packages<<EOF"
            echo "$VULN_PACKAGES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          # Severity counts for a concise at-a-glance audit summary.
          TOTAL_VULNS="$(echo "$JSON_REPORT" | jq -r '(.vulnerabilities // {}) | length')"
          CRITICAL_VULNS="$(echo "$JSON_REPORT" | jq -r '[(.vulnerabilities // {})[] | select(.severity == "critical")] | length')"
          HIGH_VULNS="$(echo "$JSON_REPORT" | jq -r '[(.vulnerabilities // {})[] | select(.severity == "high")] | length')"
          echo "total_vulns=$TOTAL_VULNS" >> "$GITHUB_OUTPUT"
          echo "critical_vulns=$CRITICAL_VULNS" >> "$GITHUB_OUTPUT"
          echo "high_vulns=$HIGH_VULNS" >> "$GITHUB_OUTPUT"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          exit 0

      # Open (or update) a GitHub Issue first so the Slack notification can
      # link directly to the created/commented issue.
      - name: Open GitHub Issue on high/critical findings
        id: open_issue
        if: steps.audit.outputs.status != '0'
        uses: actions/github-script@v7
        env:
          REPORT: ${{ steps.audit.outputs.report }}
          VULN_LIST: ${{ steps.audit.outputs.vuln_list }}
          FINGERPRINT: ${{ steps.audit.outputs.fingerprint }}
          PACKAGES: ${{ steps.audit.outputs.packages }}
          TOTAL_VULNS: ${{ steps.audit.outputs.total_vulns }}
          CRITICAL_VULNS: ${{ steps.audit.outputs.critical_vulns }}
          HIGH_VULNS: ${{ steps.audit.outputs.high_vulns }}
        with:
          script: |
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const report = process.env.REPORT || 'See workflow logs for details.';
            const vulnList = process.env.VULN_LIST || 'No specific package details could be extracted.';
            const fingerprint = process.env.FINGERPRINT || 'unknown';
            const labels = ['dependencies', 'security', 'audit'];
            const title = '🚨 Dependency audit: high/critical vulnerabilities detected';
            // Hidden marker used to deduplicate: the same vulnerability set
            // produces the same fingerprint, so we never raise a duplicate.
            const marker = `<!-- vuln-fingerprint: ${fingerprint} -->`;

            // Ensure each label exists (ignore errors if they already exist or
            // if the repo disallows label creation).
              .split('\n')
              .map((p) => p.trim())
              .filter(Boolean);

            async function findDependabotFixPrs() {
              if (packages.length === 0) return [];
              let openPrs = [];
              try {
                openPrs = await github.paginate(github.rest.pulls.list, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  state: 'open',
                  per_page: 100,
                });
              } catch (e) {
                core.warning(`Could not list pull requests: ${e.message}`);
                return [];
              }

              const isDependabot = (pr) =>
                (pr.user && (pr.user.login === 'dependabot[bot]' || pr.user.login === 'dependabot')) ||
                (pr.head && typeof pr.head.ref === 'string' && pr.head.ref.startsWith('dependabot/'));

              const matches = [];
              for (const pr of openPrs) {
                if (!isDependabot(pr)) continue;
                const haystack = `${pr.title || ''}\n${(pr.head && pr.head.ref) || ''}`.toLowerCase();
                const fixed = packages.filter((name) => haystack.includes(name.toLowerCase()));
                if (fixed.length > 0) {
                  matches.push({ number: pr.number, url: pr.html_url, title: pr.title, fixed });
                }
              }
              return matches;
            }

            const fixPrs = await findDependabotFixPrs();
            const fixSection = fixPrs.length
              ? [
                  `### 🔁 Related Dependabot fix PRs`,
                  ``,
                  ...fixPrs.map(
                    (pr) => `- #${pr.number} — ${pr.title} (fixes: ${pr.fixed.join(', ')})`
                  ),
                ]
              : [
                  `### 🔁 Related Dependabot fix PRs`,
                  ``,
                  `_No open Dependabot PRs currently address these packages._`,
                ];

            // Severity counts for the at-a-glance summary table.
            const total = process.env.TOTAL_VULNS || '?';
            const critical = process.env.CRITICAL_VULNS || '0';
            const high = process.env.HIGH_VULNS || '0';

            const body = [
              marker,
              `> Opened automatically by the **Dependency Audit** workflow.`,
              ``,
              `A scheduled/triggered \`npm audit\` detected **high or critical** severity vulnerabilities in this project's dependencies.`,
              ``,
              `## 📊 Audit summary`,
              ``,
              `| Metric | Count |`,
              `| --- | --- |`,
              `| 🔴 Critical | ${critical} |`,
              `| 🟠 High | ${high} |`,
              `| 📦 Total affected packages | ${total} |`,
              ``,
              `**Workflow run:** ${runUrl}`,
              ``,
              `## 🧩 Vulnerable packages`,
              ``,
              vulnList,
              ``,
              ...fixSection,
              ``,
              `## ✅ Recommended next steps`,
              ``,
              `1. Review the affected packages and their advisories linked above.`,
              `2. If a Dependabot fix PR is listed, review and merge it once CI passes.`,
              `3. Otherwise, run \`npm audit fix\` locally; for breaking changes use \`npm audit fix --force\` cautiously and verify the build/tests.`,
              `4. If no upstream fix exists, assess exploitability in this app's context and apply a temporary mitigation (override, pin, or remove the dependency).`,
              `5. Re-run the audit to confirm resolution, then close this issue (it auto-deduplicates by vulnerability fingerprint).`,
              ``,
              `<details><summary>📄 Audit report (trimmed)</summary>`,
              ``,
              '```',
              report,
              '```',
              ``,
              `</details>`,
            ].join('\n');

            // Ensure the label exists (ignore error if it already does).
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
                color: 'd73a4a',
                description: 'Automated dependency audit findings',
              });
            } catch (e) { /* label likely already exists */ }

            // Look across open issues for one whose fingerprint marker matches
            // the current vulnerability set. If found, this exact set has
            // already been reported — skip creating an issue/comment entirely.
            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
              per_page: 100,
            });

            const duplicate = openIssues.find(
              (issue) => (issue.body || '').includes(marker)
            );

            if (duplicate) {
              const issueUrl = duplicate.html_url;
              core.info(`Duplicate vulnerability set (fingerprint ${fingerprint}); existing issue #${duplicate.number} already tracks it. Skipping creation.`);

              // Even though we skip creating a new issue, surface any newly
              // discovered Dependabot fix PRs that aren't already linked on the
              // existing issue, so reviewers know a fix is available.
              if (fixPrs.length) {
                let existingComments = [];
                try {
                  existingComments = await github.paginate(github.rest.issues.listComments, {
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: duplicate.number,
                    per_page: 100,
                  });
                } catch (e) { /* non-fatal */ }

                const alreadyLinked = (prNumber) =>
                  (duplicate.body || '').includes(`#${prNumber}`) ||
                  existingComments.some((c) => (c.body || '').includes(`#${prNumber}`));

                const newPrs = fixPrs.filter((pr) => !alreadyLinked(pr.number));
                if (newPrs.length) {
                  const commentBody = [
                    `**Dependabot fix PRs available for this vulnerability set:**`,
                    ``,
                    ...newPrs.map(
                      (pr) => `- #${pr.number} — ${pr.title} (fixes: ${pr.fixed.join(', ')})`
                    ),
                  ].join('\n');
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: duplicate.number,
                    body: commentBody,
                  });
                  core.info(`Linked ${newPrs.length} new Dependabot fix PR(s) to issue #${duplicate.number}.`);
                }
              }

              core.setOutput('issue_url', issueUrl);
              core.setOutput('is_new', 'false');
              return;
            }

            // No issue tracks this exact set yet — create a fresh one.
            const created = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: [label],
            });
            core.info(`Created issue #${created.data.number}: ${created.data.html_url}`);
            core.setOutput('issue_url', created.data.html_url);
            core.setOutput('is_new', 'true');

      - name: Notify Slack on high/critical findings
        if: steps.audit.outputs.status != '0' && env.SLACK_WEBHOOK_URL != '' && steps.open_issue.outputs.is_new == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPORT: ${{ steps.audit.outputs.report }}
          VULN_LIST: ${{ steps.audit.outputs.vuln_list }}
          ISSUE_URL: ${{ steps.open_issue.outputs.issue_url }}
        run: |
          PAYLOAD=$(jq -n \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg run "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --arg issueUrl "${ISSUE_URL:-}" \
            --arg report "$REPORT" \
            --arg vulnList "${VULN_LIST:-No specific package details could be extracted.}" \
            '{
              text: ":rotating_light: *Dependency audit found high/critical vulnerabilities*",
              blocks: [
                { type: "section", text: { type: "mrkdwn", text: (":rotating_light: *High/critical dependency vulnerabilities in* `" + $repo + "`") } },
                { type: "section", text: { type: "mrkdwn", text: ("*Vulnerable packages:*\n" + $vulnList) } },
                (if $issueUrl != "" then { type: "section", text: { type: "mrkdwn", text: ("*GitHub Issue:* <" + $issueUrl + "|View / track issue>") } } else empty end),
                { type: "section", text: { type: "mrkdwn", text: ("*Audit report:*\n```" + $report + "```") } },
                { type: "section", text: { type: "mrkdwn", text: ("<" + $run + "|View workflow run>") } }
              ]
            }')
          curl -sf -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"

      # Send a reassuring "all clear" message only on the scheduled weekly run
      # when no high or critical vulnerabilities are found, so the team knows the
      # supply-chain baseline is healthy without having to check the logs.
      - name: Notify Slack on clean weekly audit
        if: steps.audit.outputs.status == '0' && env.SLACK_WEBHOOK_URL != '' && github.event_name == 'schedule'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          PAYLOAD=$(jq -n \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg run "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            '{
              text: ":white_check_mark: *Weekly dependency audit: all clear*",
              blocks: [
                { type: "section", text: { type: "mrkdwn", text: (":white_check_mark: *Weekly dependency audit is clean for* `" + $repo + "`") } },
                { type: "section", text: { type: "mrkdwn", text: "No high or critical vulnerabilities were detected in the latest scheduled audit." } },
                { type: "section", text: { type: "mrkdwn", text: ("<" + $run + "|View workflow run>") } }
              ]
            }')
          curl -sf -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"

      - name: Fail if vulnerabilities were found
        if: steps.audit.outputs.status != '0'
        run: |
          echo "High or critical vulnerabilities detected. See the audit report above."
          exit 1

