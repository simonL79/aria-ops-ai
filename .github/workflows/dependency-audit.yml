name: Dependency Audit

# Proactive supply-chain alerting: runs weekly and on every dependency change.
# Fails (and therefore surfaces an alert/notification) when a high or critical
# severity advisory is found, so upstream fixes can be applied promptly.
on:
  schedule:
    - cron: "0 7 * * 1" # Mondays 07:00 UTC
  push:
    paths:
      - "package.json"
      - "package-lock.json"
      - "bun.lockb"
  pull_request:
    paths:
      - "package.json"
      - "package-lock.json"
      - "bun.lockb"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies (no scripts)
        run: npm ci --ignore-scripts

      # Capture the audit result without aborting the job, so we can post a
      # Slack alert and GitHub issue before failing the run.
      - name: Audit (high + critical only)
        id: audit
        run: |
          set +e
          JSON_REPORT="$(npm audit --json --audit-level=high 2>/dev/null)"
          TEXT_REPORT="$(npm audit --audit-level=high 2>&1)"
          STATUS=$?
          echo "$TEXT_REPORT"

          # Persist the full audit reports to disk so they can be uploaded as a
          # build artifact and linked directly from the issue/Slack notifications.
          mkdir -p audit-report
          printf '%s\n' "$JSON_REPORT" > audit-report/npm-audit.json
          printf '%s\n' "$TEXT_REPORT" > audit-report/npm-audit.txt

          # Extract a concise, specific list of vulnerable packages and versions
          # from the JSON audit output for Slack/GitHub issue notifications.
          VULN_LIST="$(echo "$JSON_REPORT" | jq -r '
            .vulnerabilities // {}
            | to_entries
            | map(.value)
            | map(
                "• \(.name) (affected: \(.range)) — \(.severity | ascii_upcase)" +
                (if (.via | type) == "array" and (.via[0] | type) == "object"
                 then " — \(.via[0].title) — <\(.via[0].url)>"
                 else "" end)
              )
            | join("\n")
          ')"

          # Build a stable fingerprint of the unique vulnerability set so the
          # workflow can deduplicate: identical sets produce the same hash
          # regardless of run, ordering, or transient report formatting.
          FINGERPRINT="$(echo "$JSON_REPORT" | jq -S -r '
            .vulnerabilities // {}
            | to_entries
            | map({
                name: .value.name,
                severity: .value.severity,
                range: .value.range
              })
            | sort_by(.name, .severity, .range)
          ' | sha256sum | cut -d" " -f1)"
          echo "fingerprint=$FINGERPRINT" >> "$GITHUB_OUTPUT"
          echo "::notice::Vulnerability-set fingerprint: $FINGERPRINT"
          {
            echo "### 🔐 Vulnerability-set fingerprint"
            echo ""
            echo "\`$FINGERPRINT\`"
            echo ""
            echo "This hash is used to deduplicate repeated audit reports for the same set of vulnerabilities."
          } >> "$GITHUB_STEP_SUMMARY"

          # Persist a trimmed text report and the vulnerable package list.
          {
            echo "report<<EOF"
            echo "$TEXT_REPORT" | tail -n 40
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          {
            echo "vuln_list<<EOF"
            echo "$VULN_LIST"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          # Machine-readable, newline-separated list of vulnerable package
          # names so downstream steps can match them against Dependabot PRs.
          VULN_PACKAGES="$(echo "$JSON_REPORT" | jq -r '
            .vulnerabilities // {}
            | keys
            | .[]
          ')"
          {
            echo "packages<<EOF"
            echo "$VULN_PACKAGES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          # Severity counts for a concise at-a-glance audit summary.
          TOTAL_VULNS="$(echo "$JSON_REPORT" | jq -r '(.vulnerabilities // {}) | length')"
          CRITICAL_VULNS="$(echo "$JSON_REPORT" | jq -r '[(.vulnerabilities // {})[] | select(.severity == "critical")] | length')"
          HIGH_VULNS="$(echo "$JSON_REPORT" | jq -r '[(.vulnerabilities // {})[] | select(.severity == "high")] | length')"
          echo "total_vulns=$TOTAL_VULNS" >> "$GITHUB_OUTPUT"
          echo "critical_vulns=$CRITICAL_VULNS" >> "$GITHUB_OUTPUT"
          echo "high_vulns=$HIGH_VULNS" >> "$GITHUB_OUTPUT"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          exit 0

      # Upload the full audit reports as a build artifact so the issue/Slack
      # notifications can link to a downloadable, complete copy of the findings.
      - name: Upload audit report artifact
        id: upload_report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit-report-${{ github.run_id }}
          path: audit-report/
          if-no-files-found: warn
          retention-days: 90



      # Open (or update) a GitHub Issue first so the Slack notification can
      # link directly to the created/commented issue.
      - name: Open GitHub Issue on high/critical findings
        id: open_issue
        if: steps.audit.outputs.status != '0'
        uses: actions/github-script@v7
        env:
          REPORT: ${{ steps.audit.outputs.report }}
          VULN_LIST: ${{ steps.audit.outputs.vuln_list }}
          FINGERPRINT: ${{ steps.audit.outputs.fingerprint }}
          PACKAGES: ${{ steps.audit.outputs.packages }}
          TOTAL_VULNS: ${{ steps.audit.outputs.total_vulns }}
          CRITICAL_VULNS: ${{ steps.audit.outputs.critical_vulns }}
          HIGH_VULNS: ${{ steps.audit.outputs.high_vulns }}
          REPORT_ARTIFACT_URL: ${{ steps.upload_report.outputs.artifact-url }}
        with:
          script: |
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            // Direct link to the uploaded audit-report artifact. Fall back to the
            // run's artifacts tab if the upload step did not expose a URL.
            const reportArtifactUrl = process.env.REPORT_ARTIFACT_URL || `${runUrl}#artifacts`;
            const report = process.env.REPORT || 'See workflow logs for details.';
            const vulnList = process.env.VULN_LIST || 'No specific package details could be extracted.';
            const fingerprint = process.env.FINGERPRINT || 'unknown';
            const critical = parseInt(process.env.CRITICAL_VULNS || '0', 10);
            const high = parseInt(process.env.HIGH_VULNS || '0', 10);
            const severityLabel = critical > 0 ? 'critical' : high > 0 ? 'high' : null;
            const labels = ['dependencies', 'security', 'audit'];
            if (severityLabel) labels.push(severityLabel);
            const title = '🚨 Dependency audit: high/critical vulnerabilities detected';
            // Hidden marker used to deduplicate: the same vulnerability set
            // produces the same fingerprint, so we never raise a duplicate.
            const marker = `<!-- vuln-fingerprint: ${fingerprint} -->`;

            // Ensure each label exists (ignore errors if they already exist or
            // if the repo disallows label creation).
            for (const label of labels) {
              const color = label === 'security' ? 'd73a4a' : label === 'critical' ? 'b91c1c' : label === 'high' ? 'f59e0b' : '1d76db';
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                  color,
                  description: `Automated dependency audit: ${label}`,
                });
              } catch (e) { /* label likely already exists */ }
            }

            // Parse the vulnerable package names so we can look for any open
            // Dependabot PRs that bump them and link those fixes in the issue.
            const packages = (process.env.PACKAGES || '')
              .split('\n')
              .map((p) => p.trim())
              .filter(Boolean);

            async function findDependabotFixPrs() {
              if (packages.length === 0) return [];
              let openPrs = [];
              try {
                openPrs = await github.paginate(github.rest.pulls.list, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  state: 'open',
                  per_page: 100,
                });
              } catch (e) {
                core.warning(`Could not list pull requests: ${e.message}`);
                return [];
              }

              const isDependabot = (pr) =>
                (pr.user && (pr.user.login === 'dependabot[bot]' || pr.user.login === 'dependabot')) ||
                (pr.head && typeof pr.head.ref === 'string' && pr.head.ref.startsWith('dependabot/'));

              const matches = [];
              for (const pr of openPrs) {
                if (!isDependabot(pr)) continue;
                const haystack = `${pr.title || ''}\n${(pr.head && pr.head.ref) || ''}`.toLowerCase();
                const fixed = packages.filter((name) => haystack.includes(name.toLowerCase()));
                if (fixed.length > 0) {
                  matches.push({ number: pr.number, url: pr.html_url, title: pr.title, fixed });
                }
              }
              return matches;
            }

            const fixPrs = await findDependabotFixPrs();
            const fixSection = fixPrs.length
              ? [
                  `### 🔁 Related Dependabot fix PRs`,
                  ``,
                  ...fixPrs.map(
                    (pr) => `- #${pr.number} — ${pr.title} (fixes: ${pr.fixed.join(', ')})`
                  ),
                ]
              : [
                  `### 🔁 Related Dependabot fix PRs`,
                  ``,
                  `_No open Dependabot PRs currently address these packages._`,
                ];

            // Severity counts for the at-a-glance summary table (already
            // parsed above for the severity label decision).
            const total = process.env.TOTAL_VULNS || '?';
            const criticalCount = critical;
            const highCount = high;

            // ISO timestamp recording when this audit data was last refreshed.
            const lastUpdated = new Date().toISOString();

            const body = [
              marker,
              `> Opened automatically by the **Dependency Audit** workflow.`,
              ``,
              `A scheduled/triggered \`npm audit\` detected **high or critical** severity vulnerabilities in this project's dependencies.`,
              ``,
              `## 📊 Audit summary`,
              ``,
              `| Metric | Count |`,
              `| --- | --- |`,
              `| 🔴 Critical | ${criticalCount} |`,
              `| 🟠 High | ${highCount} |`,
              `| 📦 Total affected packages | ${total} |`,
              ``,
              `**Last updated:** ${lastUpdated}`,
              `**Workflow run:** ${runUrl}`,
              `**Full audit report:** [Download artifact](${reportArtifactUrl})`,
              ``,
              `## 🧩 Vulnerable packages`,
              ``,
              vulnList,
              ``,
              ...fixSection,
              ``,
              `## ✅ Recommended next steps`,
              ``,
              `1. Review the affected packages and their advisories linked above.`,
              `2. If a Dependabot fix PR is listed, review and merge it once CI passes.`,
              `3. Otherwise, run \`npm audit fix\` locally; for breaking changes use \`npm audit fix --force\` cautiously and verify the build/tests.`,
              `4. If no upstream fix exists, assess exploitability in this app's context and apply a temporary mitigation (override, pin, or remove the dependency).`,
              `5. Re-run the audit to confirm resolution, then close this issue (it auto-deduplicates by vulnerability fingerprint).`,
              ``,
              `<details><summary>📄 Audit report (trimmed)</summary>`,
              ``,
              '```',
              report,
              '```',
              ``,
              `</details>`,
            ].join('\n');

            // Deduplicate across existing audit issues using the stable triage
            // labels. The fingerprint marker is the real dedup key, so we use
            // the base label set to ensure we don't miss an issue just because
            // its severity label differs from the current run.
            const triageLabels = ['dependencies', 'security', 'audit'];
            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: triageLabels.join(','),
              per_page: 100,
            });

            const duplicate = openIssues.find(
              (issue) => (issue.body || '').includes(marker)
            );

            if (duplicate) {
              const issueUrl = duplicate.html_url;
              core.info(`Matching vulnerability set (fingerprint ${fingerprint}); refreshing existing issue #${duplicate.number} with the latest audit details.`);

              // Refresh the existing issue body with the latest audit details
              // (updated package ranges, advisory URLs, severity counts, fix PRs
              // and a new "last updated" timestamp) instead of skipping. The
              // fingerprint marker is preserved so deduplication still holds.
              try {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: duplicate.number,
                  body,
                });
                core.info(`Updated issue #${duplicate.number} with refreshed audit details.`);
              } catch (e) {
                core.warning(`Could not update issue #${duplicate.number}: ${e.message}`);
              }

              // If the highest severity has changed, apply the current severity
              // label so the issue is always tagged with the most critical
              // status known for this vulnerability set.
              if (severityLabel) {
                const existingLabels = duplicate.labels.map((l) => l.name);
                if (!existingLabels.includes(severityLabel)) {
                  try {
                    await github.rest.issues.addLabels({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: duplicate.number,
                      labels: [severityLabel],
                    });
                    core.info(`Applied severity label ${severityLabel} to issue #${duplicate.number}.`);
                  } catch (e) {
                    core.warning(`Could not add severity label to issue #${duplicate.number}: ${e.message}`);
                  }
                }
              }

              // Surface any newly discovered Dependabot fix PRs that aren't
              // already linked on the existing issue, so reviewers know a fix is
              // available.
              if (fixPrs.length) {
                let existingComments = [];
                try {
                  existingComments = await github.paginate(github.rest.issues.listComments, {
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: duplicate.number,
                    per_page: 100,
                  });
                } catch (e) { /* non-fatal */ }

                const alreadyLinked = (prNumber) =>
                  (duplicate.body || '').includes(`#${prNumber}`) ||
                  existingComments.some((c) => (c.body || '').includes(`#${prNumber}`));

                const newPrs = fixPrs.filter((pr) => !alreadyLinked(pr.number));
                if (newPrs.length) {
                  const commentBody = [
                    `**Dependabot fix PRs available for this vulnerability set:**`,
                    ``,
                    ...newPrs.map(
                      (pr) => `- #${pr.number} — ${pr.title} (fixes: ${pr.fixed.join(', ')})`
                    ),
                  ].join('\n');
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: duplicate.number,
                    body: commentBody,
                  });
                  core.info(`Linked ${newPrs.length} new Dependabot fix PR(s) to issue #${duplicate.number}.`);

                  // Expose the newly linked PRs so a Slack notification can
                  // report that an existing deduplicated issue gained fix PRs,
                  // including the direct PR URLs.
                  core.setOutput('new_pr_count', String(newPrs.length));
                  core.setOutput(
                    'new_pr_links',
                    newPrs
                      .map((pr) => `• <${pr.url}|#${pr.number}> — ${pr.title} (fixes: ${pr.fixed.join(', ')})`)
                      .join('\n')
                  );
                }
              }

              core.setOutput('issue_url', issueUrl);
              core.setOutput('is_new', 'false');
              // This vulnerability set already had an open issue, so a new issue
              // was suppressed by deduplication (the existing one was refreshed).
              core.setOutput('suppressed_count', '1');
              return;
            }

            // No issue tracks this exact set yet — create a fresh one.
            const created = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels,
            });
            core.info(`Created issue #${created.data.number}: ${created.data.html_url}`);
            core.setOutput('issue_url', created.data.html_url);
            core.setOutput('is_new', 'true');
            // A fresh issue was created, so nothing was suppressed this run.
            core.setOutput('suppressed_count', '0');

      # Surface the fingerprint and dedup decision in the workflow logs for
      # auditability: this makes it easy to verify why an issue was created,
      # refreshed, or suppressed without reading the full GitHub script output.
      - name: Log audit dedup decision
        if: always() && steps.audit.outputs.status != '0'
        env:
          FINGERPRINT: ${{ steps.audit.outputs.fingerprint }}
          IS_NEW: ${{ steps.open_issue.outputs.is_new }}
          ISSUE_URL: ${{ steps.open_issue.outputs.issue_url }}
          SUPPRESSED_COUNT: ${{ steps.open_issue.outputs.suppressed_count }}
        run: |
          echo "::notice::Vulnerability-set fingerprint: ${FINGERPRINT:-unknown}"
          echo "::notice::Issue is new: ${IS_NEW:-unknown}"
          echo "::notice::Issue URL: ${ISSUE_URL:-none}"
          echo "::notice::Suppressed count: ${SUPPRESSED_COUNT:-0}"

          {
            echo "### 📋 Dedup decision"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Fingerprint | \`${FINGERPRINT:-unknown}\` |"
            echo "| Issue is new | \`${IS_NEW:-unknown}\` |"
            echo "| Issue URL | ${ISSUE_URL:+<}${ISSUE_URL:-none}${ISSUE_URL:+>} |"
            echo "| Suppressed count | \`${SUPPRESSED_COUNT:-0}\` |"
            echo ""
            case "${IS_NEW:-unknown}" in
              true)
                echo "✅ A new GitHub Issue was created because no existing issue matched this fingerprint."
                ;;
              false)
                echo "♻️ An existing issue matched this fingerprint, so the report was refreshed and no new issue was created."
                ;;
              *)
                echo "⚠️ Dedup status could not be determined (the open_issue step may have been skipped or failed)."
                ;;
            esac
          } >> "$GITHUB_STEP_SUMMARY"

      # On every audit run (push, manual, or scheduled), auto-resolve any prior
      # high/critical audit issues whose vulnerability fingerprint no longer
      # appears in the latest audit. A clean run (no high/critical findings)
      # resolves all open audit issues; a run with findings resolves only the
      # stale ones, leaving the issue for the current fingerprint open.
      - name: Resolve stale audit issues no longer present
        id: resolve_stale
        if: always()
        uses: actions/github-script@v7
        env:
          STATUS: ${{ steps.audit.outputs.status }}
          FINGERPRINT: ${{ steps.audit.outputs.fingerprint }}
        with:
          script: |
            const labels = ['dependencies', 'security', 'audit'];
            const resolvedLabel = 'resolved';
            const status = process.env.STATUS || '0';
            // Current fingerprint represents the latest vulnerability set. When
            // the run is clean (status 0) there is no active set, so every open
            // audit issue is considered stale.
            const currentFingerprint = status === '0' ? null : (process.env.FINGERPRINT || null);
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;

            // Ensure the "resolved" label exists for triage filtering.
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: resolvedLabel,
                color: '0e8a16',
                description: 'Automated dependency audit: vulnerability set no longer present',
              });
            } catch (e) { /* label likely already exists */ }

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: labels.join(','),
              per_page: 100,
            });

            // Extract the fingerprint embedded in an issue body marker.
            const fingerprintOf = (issue) => {
              const m = (issue.body || '').match(/<!--\s*vuln-fingerprint:\s*([0-9a-f]+)\s*-->/i);
              return m ? m[1] : null;
            };

            let resolvedCount = 0;
            for (const issue of openIssues) {
              const fp = fingerprintOf(issue);
              if (!fp) continue; // not a fingerprinted audit issue
              if (currentFingerprint && fp === currentFingerprint) continue; // still active

              try {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `✅ This vulnerability set no longer appears in the latest dependency audit, so it has been auto-resolved.\n\n**Workflow run:** ${runUrl}`,
                });
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  labels: [resolvedLabel],
                });
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed',
                  state_reason: 'completed',
                });
                resolvedCount += 1;
                core.info(`Resolved stale audit issue #${issue.number} (fingerprint ${fp}).`);
              } catch (e) {
                core.warning(`Could not resolve issue #${issue.number}: ${e.message}`);
              }
            }

            core.setOutput('resolved_count', String(resolvedCount));
            core.info(`Auto-resolved ${resolvedCount} stale audit issue(s).`);

      # Notify Slack when stale audit issues were auto-resolved this run.
      - name: Notify Slack on resolved audit issues
        if: always() && env.SLACK_WEBHOOK_URL != '' && steps.resolve_stale.outputs.resolved_count != '' && steps.resolve_stale.outputs.resolved_count != '0'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RESOLVED_COUNT: ${{ steps.resolve_stale.outputs.resolved_count }}
        run: |
          PAYLOAD=$(jq -n \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg run "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --arg resolved "${RESOLVED_COUNT:-0}" \
            '{
              text: ":white_check_mark: *Dependency audit: stale vulnerability issues resolved*",
              blocks: [
                { type: "section", text: { type: "mrkdwn", text: (":white_check_mark: *Auto-resolved* `" + $resolved + "` *prior high/critical audit issue(s) in* `" + $repo + "`") } },
                { type: "section", text: { type: "mrkdwn", text: "These vulnerability sets no longer appear in the latest audit." } },
                { type: "section", text: { type: "mrkdwn", text: ("<" + $run + "|View workflow run>") } }
              ]
            }')
          curl -sf -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"




      - name: Notify Slack on high/critical findings
        if: steps.audit.outputs.status != '0' && env.SLACK_WEBHOOK_URL != '' && steps.open_issue.outputs.is_new == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPORT: ${{ steps.audit.outputs.report }}
          VULN_LIST: ${{ steps.audit.outputs.vuln_list }}
          ISSUE_URL: ${{ steps.open_issue.outputs.issue_url }}
          REPORT_ARTIFACT_URL: ${{ steps.upload_report.outputs.artifact-url }}
        run: |
          PAYLOAD=$(jq -n \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg run "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --arg issueUrl "${ISSUE_URL:-}" \
            --arg reportArtifact "${REPORT_ARTIFACT_URL:-}" \
            --arg report "$REPORT" \
            --arg vulnList "${VULN_LIST:-No specific package details could be extracted.}" \
            '{
              text: ":rotating_light: *Dependency audit found high/critical vulnerabilities*",
              blocks: [
                { type: "section", text: { type: "mrkdwn", text: (":rotating_light: *High/critical dependency vulnerabilities in* `" + $repo + "`") } },
                { type: "section", text: { type: "mrkdwn", text: ("*Vulnerable packages:*\n" + $vulnList) } },
                (if $issueUrl != "" then { type: "section", text: { type: "mrkdwn", text: ("*GitHub Issue:* <" + $issueUrl + "|View / track issue>") } } else empty end),
                (if $reportArtifact != "" then { type: "section", text: { type: "mrkdwn", text: ("*Full audit report:* <" + $reportArtifact + "|Download artifact>") } } else empty end),
                { type: "section", text: { type: "mrkdwn", text: ("*Audit report:*\n```" + $report + "```") } },
                { type: "section", text: { type: "mrkdwn", text: ("<" + $run + "|View workflow run>") } }
              ]
            }')
          curl -sf -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"

      # Report how many high/critical vulnerability sets were suppressed by
      # deduplication this run (i.e. an existing issue already tracked the same
      # fingerprint, so no new issue was opened — the existing one was refreshed).
      - name: Notify Slack on deduplicated vulnerability sets
        if: steps.audit.outputs.status != '0' && env.SLACK_WEBHOOK_URL != '' && steps.open_issue.outputs.suppressed_count != '' && steps.open_issue.outputs.suppressed_count != '0'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SUPPRESSED_COUNT: ${{ steps.open_issue.outputs.suppressed_count }}
          FINGERPRINT: ${{ steps.audit.outputs.fingerprint }}
          ISSUE_URL: ${{ steps.open_issue.outputs.issue_url }}
        run: |
          PAYLOAD=$(jq -n \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg run "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --arg suppressed "${SUPPRESSED_COUNT:-0}" \
            --arg fingerprint "${FINGERPRINT:-unknown}" \
            --arg issueUrl "${ISSUE_URL:-}" \
            '{
              text: ":recycle: *Dependency audit: vulnerability sets deduplicated*",
              blocks: [
                { type: "section", text: { type: "mrkdwn", text: (":recycle: *Deduplication suppressed* `" + $suppressed + "` *high/critical vulnerability set(s) in* `" + $repo + "`") } },
                { type: "section", text: { type: "mrkdwn", text: ("*Suppressed sets:* " + $suppressed + "\n*Fingerprint:* `" + ($fingerprint | .[0:12]) + "…`") } },
                (if $issueUrl != "" then { type: "section", text: { type: "mrkdwn", text: ("*Existing issue refreshed:* <" + $issueUrl + "|View / track issue>") } } else empty end),
                { type: "section", text: { type: "mrkdwn", text: ("<" + $run + "|View workflow run>") } }
              ]
            }')
          curl -sf -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"


      # Send a reassuring "all clear" message only on the scheduled weekly run
      # when no high or critical vulnerabilities are found, so the team knows the
      # supply-chain baseline is healthy without having to check the logs.
      - name: Notify Slack on clean weekly audit
        if: steps.audit.outputs.status == '0' && env.SLACK_WEBHOOK_URL != '' && github.event_name == 'schedule'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          PAYLOAD=$(jq -n \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg run "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            '{
              text: ":white_check_mark: *Weekly dependency audit: all clear*",
              blocks: [
                { type: "section", text: { type: "mrkdwn", text: (":white_check_mark: *Weekly dependency audit is clean for* `" + $repo + "`") } },
                { type: "section", text: { type: "mrkdwn", text: "No high or critical vulnerabilities were detected in the latest scheduled audit." } },
                { type: "section", text: { type: "mrkdwn", text: ("<" + $run + "|View workflow run>") } }
              ]
            }')
          curl -sf -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"

      - name: Fail if vulnerabilities were found
        if: steps.audit.outputs.status != '0'
        run: |
          echo "High or critical vulnerabilities detected. See the audit report above."
          exit 1

