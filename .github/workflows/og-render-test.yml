name: OG render test (strict)

on:
  # Push trigger removed — was firing failure emails on every commit.
  # Daily cron + manual dispatch is enough signal for OG render regressions.
  schedule:
    - cron: '30 6 * * *'  # daily 06:30 UTC
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL to test (defaults to production)'
        required: false
        default: 'https://www.ariaops.co.uk'
      skip_wait:
        description: 'Skip the production-live probe (run check immediately)'
        required: false
        default: 'false'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Playwright + chromium
        run: npx --yes playwright@1.47.0 install --with-deps chromium
      - name: Wait for production deploy
        if: ${{ github.event.inputs.skip_wait != 'true' }}
        env:
          BASE_URL: ${{ github.event.inputs.base_url || 'https://www.ariaops.co.uk' }}
          TIMEOUT_MS: '1800000'
          INTERVAL_MS: '30000'
        run: node scripts/wait-for-deploy.mjs
      - name: Strict og:image render test
        env:
          BASE_URL: ${{ github.event.inputs.base_url || 'https://www.ariaops.co.uk' }}
        run: node scripts/test-og-rendered.mjs
