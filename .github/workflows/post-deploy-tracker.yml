name: Post-deploy Google Images tracker

# Runs after a SEO-affecting push lands on main:
#   1. Polls production until the new build is live (rendered og:image
#      on /simon-lindsay/ksl points at /og/simon-ksl.jpg).
#   2. Runs the SerpAPI tracker.
#   3. Appends the result to og-tracking/history.md and commits it
#      back to main so the heroLive trajectory is visible in-repo.
#   4. Uploads the raw JSON as a build artifact.
#
# Also exposed as workflow_dispatch so you can fire it manually right
# after clicking Publish → Update in Lovable.

on:
  push:
    branches: [main]
    paths:
      - 'src/components/seo/**'
      - 'src/pages/simon-lindsay/**'
      - 'public/og/**'
      - 'public/image-sitemap.xml'
      - 'scripts/track-google-images.mjs'
      - 'scripts/append-tracker-history.mjs'
      - 'scripts/wait-for-deploy.mjs'
      - '.github/workflows/post-deploy-tracker.yml'
  workflow_dispatch:
    inputs:
      skip_wait:
        description: 'Skip the production-live probe (run tracker immediately)'
        required: false
        default: 'false'
      fail_mode:
        description: 'Tracker fail policy: strict (fail if any heroLive=false), regression (fail only on regressions vs prior snapshot), off (never fail)'
        required: false
        default: 'strict'
      allow_pw_cache_miss:
        description: 'Permit a Playwright cache miss for this run (use after a Playwright version bump). Default: strict mode fails on miss.'
        required: false
        default: 'false'
      warm_cache_on_miss:
        description: 'On a Playwright cache miss, upload the freshly-populated ~/.cache/ms-playwright as an artifact so the next run can seed it manually. Requires allow_pw_cache_miss=true to have effect.'
        required: false
        default: 'true'

permissions:
  contents: write   # needed to commit history.md back

concurrency:
  group: post-deploy-tracker
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node_version: '20'

      - name: Cache npm tarball cache (~/.npm)
        if: ${{ github.event.inputs.skip_wait != 'true' }}
        id: npm-cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-cache-playwright-1.47.0-${{ runner.os }}
          restore-keys: |
            npm-cache-playwright-

      - name: Cache Playwright browsers
        if: ${{ github.event.inputs.skip_wait != 'true' }}
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-1.47.0-${{ runner.os }}
          restore-keys: |
            playwright-chromium-

      - name: Report cache status (npm + Playwright)
        if: ${{ github.event.inputs.skip_wait != 'true' }}
        env:
          PW_HIT:           ${{ steps.pw-cache.outputs.cache-hit }}
          PW_PRIMARY_KEY:   ${{ steps.pw-cache.outputs.cache-primary-key }}
          PW_MATCHED_KEY:   ${{ steps.pw-cache.outputs.cache-matched-key }}
          PW_RESTORE_KEYS:  "playwright-chromium-"
          NPM_HIT:          ${{ steps.npm-cache.outputs.cache-hit }}
          NPM_PRIMARY_KEY:  ${{ steps.npm-cache.outputs.cache-primary-key }}
          NPM_MATCHED_KEY:  ${{ steps.npm-cache.outputs.cache-matched-key }}
          NPM_RESTORE_KEYS: "npm-cache-playwright-"
          # Strict by default: a cache miss fails the job. The very first run
          # after a Playwright version bump will legitimately miss — set repo
          # variable ALLOW_PW_CACHE_MISS=true (or pass workflow input) to bypass.
          ALLOW_PW_CACHE_MISS: ${{ github.event.inputs.allow_pw_cache_miss || vars.ALLOW_PW_CACHE_MISS || 'false' }}
        run: |
          echo "──────── Playwright cache ────────"
          echo "  primary key   : ${PW_PRIMARY_KEY}"
          echo "  restore keys  : ${PW_RESTORE_KEYS}"
          echo "  matched key   : ${PW_MATCHED_KEY:-<none>}"
          echo "  exact hit     : ${PW_HIT:-false}"
          echo "──────── npm tarball cache ────────"
          echo "  primary key   : ${NPM_PRIMARY_KEY}"
          echo "  restore keys  : ${NPM_RESTORE_KEYS}"
          echo "  matched key   : ${NPM_MATCHED_KEY:-<none>}"
          echo "  exact hit     : ${NPM_HIT:-false}"
          echo "───────────────────────────────────"

          # Determine status labels
          if [ "${PW_HIT}" = "true" ]; then
            PW_STATUS="✅ HIT"; PW_DETAIL="exact match on \`${PW_PRIMARY_KEY}\` — browser download skipped."
          elif [ -n "${PW_MATCHED_KEY}" ]; then
            PW_STATUS="🟡 PARTIAL"; PW_DETAIL="restored from fallback \`${PW_MATCHED_KEY}\` (primary \`${PW_PRIMARY_KEY}\` not found). Install will top up."
          else
            PW_STATUS="❌ MISS"; PW_DETAIL="neither \`${PW_PRIMARY_KEY}\` nor restore-key \`${PW_RESTORE_KEYS}\` matched."
          fi
          if [ "${NPM_HIT}" = "true" ]; then
            NPM_STATUS="✅ HIT"; NPM_DETAIL="exact match on \`${NPM_PRIMARY_KEY}\`."
          elif [ -n "${NPM_MATCHED_KEY}" ]; then
            NPM_STATUS="🟡 PARTIAL"; NPM_DETAIL="restored from fallback \`${NPM_MATCHED_KEY}\`."
          else
            NPM_STATUS="❌ MISS"; NPM_DETAIL="neither \`${NPM_PRIMARY_KEY}\` nor restore-key \`${NPM_RESTORE_KEYS}\` matched."
          fi

          # Job Summary table — visible on the run's Summary page.
          {
            echo "## 🎭 Cache status"
            echo ""
            echo "| Cache | Status | Primary key | Matched key | Detail |"
            echo "|---|---|---|---|---|"
            echo "| Playwright browsers | ${PW_STATUS} | \`${PW_PRIMARY_KEY}\` | \`${PW_MATCHED_KEY:-<none>}\` | ${PW_DETAIL} |"
            echo "| npm tarballs        | ${NPM_STATUS} | \`${NPM_PRIMARY_KEY}\` | \`${NPM_MATCHED_KEY:-<none>}\` | ${NPM_DETAIL} |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          # Annotations + strict-mode gate (existing behaviour)
          if [ "${PW_HIT}" = "true" ]; then
            echo "::notice title=Playwright cache::HIT (exact: ${PW_PRIMARY_KEY}) — skipping browser download."
          elif [ -n "${PW_MATCHED_KEY}" ]; then
            echo "::notice title=Playwright cache::PARTIAL (matched ${PW_MATCHED_KEY}) — primary key ${PW_PRIMARY_KEY} not found, but restored from a fallback. Browsers may still need re-install."
          else
            echo "::error title=Playwright cache::MISS — neither ${PW_PRIMARY_KEY} nor any restore-key matched. Chromium would be downloaded (~120MB)."
            if [ "${ALLOW_PW_CACHE_MISS}" = "true" ]; then
              echo "::warning title=Playwright cache::ALLOW_PW_CACHE_MISS=true — proceeding with download despite strict mode."
              echo "> ⚠️ Strict mode bypassed via \`ALLOW_PW_CACHE_MISS=true\`." >> "$GITHUB_STEP_SUMMARY"
            else
              echo "::error title=Playwright cache::Strict mode is on by default. Re-run with workflow input allow_pw_cache_miss=true (or set repo variable ALLOW_PW_CACHE_MISS=true) to permit a one-off download — e.g. immediately after a Playwright version bump."
              echo "> ❌ Strict mode failed the run on cache miss. Set \`allow_pw_cache_miss=true\` to bypass." >> "$GITHUB_STEP_SUMMARY"
              exit 1
            fi
          fi

      - name: Playwright cache size — before install
        if: ${{ github.event.inputs.skip_wait != 'true' }}
        run: |
          echo "── ~/.cache/ms-playwright (before install) ──"
          if [ -d "$HOME/.cache/ms-playwright" ]; then
            du -sh "$HOME/.cache/ms-playwright" || true
            du -sh "$HOME/.cache/ms-playwright"/* 2>/dev/null | sort -h || true
            echo "file count: $(find "$HOME/.cache/ms-playwright" -type f | wc -l)"
          else
            echo "(directory does not exist — cache fully missed)"
          fi

      - name: Install Playwright (chromium)
        if: ${{ github.event.inputs.skip_wait != 'true' }}
        run: |
          if [ "${{ steps.pw-cache.outputs.cache-hit }}" = "true" ]; then
            npx --yes playwright@1.47.0 install-deps chromium
          else
            npx --yes playwright@1.47.0 install --with-deps chromium
          fi

      - name: Playwright cache size — after install
        if: ${{ github.event.inputs.skip_wait != 'true' }}
        env:
          PW_HIT: ${{ steps.pw-cache.outputs.cache-hit }}
        run: |
          echo "── ~/.cache/ms-playwright (after install) ──"
          if [ -d "$HOME/.cache/ms-playwright" ]; then
            TOTAL=$(du -sh "$HOME/.cache/ms-playwright" | cut -f1)
            BYTES=$(du -sb "$HOME/.cache/ms-playwright" | cut -f1)
            echo "total: ${TOTAL} (${BYTES} bytes)"
            du -sh "$HOME/.cache/ms-playwright"/* 2>/dev/null | sort -h || true
            FILES=$(find "$HOME/.cache/ms-playwright" -type f | wc -l)
            echo "file count: ${FILES}"
            # Sanity floor: chromium alone is ~120MB. Anything under 50MB
            # means the cache is effectively empty even if the dir exists.
            if [ "${BYTES}" -lt 52428800 ]; then
              echo "::warning title=Playwright cache::Suspicious — cache directory is under 50MB after install (${TOTAL}). Subsequent runs may not benefit from caching."
              SIZE_NOTE="⚠️ Suspicious size — under 50MB."
            else
              echo "::notice title=Playwright cache::Cache populated (${TOTAL}). Will be saved as '${{ steps.pw-cache.outputs.cache-primary-key }}' if this is a new key."
              SIZE_NOTE="Will be saved as \`${{ steps.pw-cache.outputs.cache-primary-key }}\` at job end if new."
            fi
            {
              echo "### 📦 Playwright cache size (post-install)"
              echo ""
              echo "| Total | Bytes | Files | Note |"
              echo "|---|---|---|---|"
              echo "| ${TOTAL} | ${BYTES} | ${FILES} | ${SIZE_NOTE} |"
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::error title=Playwright cache::Cache directory missing after install — something is very wrong."
            echo "> ❌ Cache directory missing after install." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      # Warm-cache mode: when the Playwright cache missed (no exact hit) and
      # we just paid the ~120MB chromium download, tar up the freshly-populated
      # cache and upload it as a workflow artifact. The next run (or a human)
      # can download it and seed ~/.cache/ms-playwright manually if
      # actions/cache@v4 hasn't yet saved at job end (e.g. the job was
      # cancelled, or you're debugging cache key issues).
      - name: Pack warm Playwright cache (on miss)
        id: warm-pack
        if: ${{ github.event.inputs.skip_wait != 'true' && steps.pw-cache.outputs.cache-hit != 'true' && (github.event.inputs.warm_cache_on_miss || 'true') == 'true' }}
        env:
          PW_PRIMARY_KEY: ${{ steps.pw-cache.outputs.cache-primary-key }}
        run: |
          if [ ! -d "$HOME/.cache/ms-playwright" ]; then
            echo "::warning title=Playwright warm cache::~/.cache/ms-playwright missing — nothing to pack."
            exit 0
          fi
          mkdir -p /tmp/pw-warm
          SAFE_KEY="$(echo "${PW_PRIMARY_KEY}" | tr -c 'A-Za-z0-9._-' '_')"
          TARBALL="/tmp/pw-warm/${SAFE_KEY}.tar.gz"
          echo "Packing ~/.cache/ms-playwright → ${TARBALL}"
          tar -czf "${TARBALL}" -C "$HOME/.cache" ms-playwright
          SIZE=$(du -sh "${TARBALL}" | cut -f1)
          BYTES=$(stat -c '%s' "${TARBALL}")
          echo "warm_tarball=${TARBALL}" >> "$GITHUB_OUTPUT"
          echo "warm_size=${SIZE}"        >> "$GITHUB_OUTPUT"
          echo "warm_bytes=${BYTES}"      >> "$GITHUB_OUTPUT"
          echo "::notice title=Playwright warm cache::Packed ${SIZE} (${BYTES} bytes) — uploading as artifact 'playwright-warm-cache-${{ github.run_id }}'."
          {
            echo "### 🔥 Warm Playwright cache packed (cache miss)"
            echo ""
            echo "| Key | Tarball | Size | Bytes |"
            echo "|---|---|---|---|"
            echo "| \`${PW_PRIMARY_KEY}\` | \`${SAFE_KEY}.tar.gz\` | ${SIZE} | ${BYTES} |"
            echo ""
            echo "> Uploaded as artifact \`playwright-warm-cache-${{ github.run_id }}\` (retained 7 days). Download, then \`tar -xzf <file> -C ~/.cache\` to seed \`~/.cache/ms-playwright\` on another runner if \`actions/cache@v4\` did not save (e.g. job cancelled before post-step)."
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload warm Playwright cache artifact
        if: ${{ steps.warm-pack.outputs.warm_tarball != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-warm-cache-${{ github.run_id }}
          path: ${{ steps.warm-pack.outputs.warm_tarball }}
          if-no-files-found: error
          retention-days: 7

      - name: Wait for production deploy to reflect new og:image
        if: ${{ github.event.inputs.skip_wait != 'true' }}
        env:
          BASE_URL: https://www.ariaops.co.uk
          TIMEOUT_MS: '1800000'   # 30 min — Lovable publish is manual
          INTERVAL_MS: '30000'
          REPORT_DIR: og-tracking
        run: |
          mkdir -p og-tracking
          node scripts/wait-for-deploy.mjs

      - name: Run Google Images tracker
        id: tracker
        env:
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          REPORT_DIR: og-tracking
          # Fail the job if any tracked query has heroLive=false.
          # Override per-run via workflow_dispatch input or change to
          # "regression" to only fail on previously-live queries
          # going dark.
          FAIL_MODE: ${{ github.event.inputs.fail_mode || 'strict' }}
        run: |
          mkdir -p og-tracking
          node scripts/track-google-images.mjs

      # Always append history + commit, even when the tracker fails,
      # so the regression is captured in-repo + on the dashboard.
      - name: Append run to og-tracking/history.md
        if: always()
        env:
          TRIGGER_LABEL: ${{ github.event_name == 'workflow_dispatch' && 'manual post-publish' || format('push {0}', github.sha) }}
        run: node scripts/append-tracker-history.mjs

      - name: Build dashboard payload (public/seo-status/tracker-history.json)
        run: node scripts/build-seo-status.mjs

      - name: Commit updated history + dashboard payload
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add og-tracking/history.md og-tracking/*.json og-tracking/*.csv public/seo-status/tracker-history.json || true
          if git diff --cached --quiet; then
            echo "No history changes to commit."
          else
            git commit -m "chore(seo): post-deploy heroLive snapshot [skip ci]"
            git push
          fi

      - name: Upload tracker artifacts (JSON + CSV)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: og-tracking-${{ github.run_id }}
          path: |
            og-tracking/*.json
            og-tracking/*.csv
            og-tracking/*.html
          if-no-files-found: warn
