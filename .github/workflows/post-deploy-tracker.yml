name: Post-deploy Google Images tracker

# Runs after a SEO-affecting push lands on main:
#   1. Polls production until the new build is live (rendered og:image
#      on /simon-lindsay/ksl points at /og/simon-ksl.jpg).
#   2. Runs the SerpAPI tracker.
#   3. Appends the result to og-tracking/history.md and commits it
#      back to main so the heroLive trajectory is visible in-repo.
#   4. Uploads the raw JSON as a build artifact.
#
# Also exposed as workflow_dispatch so you can fire it manually right
# after clicking Publish → Update in Lovable.

on:
  push:
    branches: [main]
    paths:
      - 'src/components/seo/**'
      - 'src/pages/simon-lindsay/**'
      - 'public/og/**'
      - 'public/image-sitemap.xml'
      - 'scripts/track-google-images.mjs'
      - 'scripts/append-tracker-history.mjs'
      - 'scripts/wait-for-deploy.mjs'
      - '.github/workflows/post-deploy-tracker.yml'
  workflow_dispatch:
    inputs:
      skip_wait:
        description: 'Skip the production-live probe (run tracker immediately)'
        required: false
        default: 'false'
      fail_mode:
        description: 'Tracker fail policy: strict (fail if any heroLive=false), regression (fail only on regressions vs prior snapshot), off (never fail)'
        required: false
        default: 'strict'

permissions:
  contents: write   # needed to commit history.md back

concurrency:
  group: post-deploy-tracker
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node_version: '20'

      - name: Cache npm tarball cache (~/.npm)
        if: ${{ github.event.inputs.skip_wait != 'true' }}
        id: npm-cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-cache-playwright-1.47.0-${{ runner.os }}
          restore-keys: |
            npm-cache-playwright-

      - name: Cache Playwright browsers
        if: ${{ github.event.inputs.skip_wait != 'true' }}
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-1.47.0-${{ runner.os }}
          restore-keys: |
            playwright-chromium-

      - name: Report cache status (npm + Playwright)
        if: ${{ github.event.inputs.skip_wait != 'true' }}
        env:
          PW_HIT:           ${{ steps.pw-cache.outputs.cache-hit }}
          PW_PRIMARY_KEY:   ${{ steps.pw-cache.outputs.cache-primary-key }}
          PW_MATCHED_KEY:   ${{ steps.pw-cache.outputs.cache-matched-key }}
          PW_RESTORE_KEYS:  "playwright-chromium-"
          NPM_HIT:          ${{ steps.npm-cache.outputs.cache-hit }}
          NPM_PRIMARY_KEY:  ${{ steps.npm-cache.outputs.cache-primary-key }}
          NPM_MATCHED_KEY:  ${{ steps.npm-cache.outputs.cache-matched-key }}
          NPM_RESTORE_KEYS: "npm-cache-playwright-"
          REQUIRE_PW_CACHE: ${{ vars.REQUIRE_PW_CACHE || 'false' }}
        run: |
          echo "──────── Playwright cache ────────"
          echo "  primary key   : ${PW_PRIMARY_KEY}"
          echo "  restore keys  : ${PW_RESTORE_KEYS}"
          echo "  matched key   : ${PW_MATCHED_KEY:-<none>}"
          echo "  exact hit     : ${PW_HIT:-false}"
          echo "──────── npm tarball cache ────────"
          echo "  primary key   : ${NPM_PRIMARY_KEY}"
          echo "  restore keys  : ${NPM_RESTORE_KEYS}"
          echo "  matched key   : ${NPM_MATCHED_KEY:-<none>}"
          echo "  exact hit     : ${NPM_HIT:-false}"
          echo "───────────────────────────────────"

          if [ "${PW_HIT}" = "true" ]; then
            echo "::notice title=Playwright cache::HIT (exact: ${PW_PRIMARY_KEY}) — skipping browser download."
          elif [ -n "${PW_MATCHED_KEY}" ]; then
            echo "::notice title=Playwright cache::PARTIAL (matched ${PW_MATCHED_KEY}) — primary key ${PW_PRIMARY_KEY} not found, but restored from a fallback. Browsers may still need re-install."
          else
            echo "::warning title=Playwright cache::MISS — neither ${PW_PRIMARY_KEY} nor any restore-key matched. Chromium will be downloaded (~120MB). First run after a Playwright version bump always misses."
            if [ "${REQUIRE_PW_CACHE}" = "true" ]; then
              echo "::error title=Playwright cache::REQUIRE_PW_CACHE=true and cache missed — failing run."
              exit 1
            fi
          fi


      - name: Install Playwright (chromium)
        if: ${{ github.event.inputs.skip_wait != 'true' }}
        run: |
          if [ "${{ steps.pw-cache.outputs.cache-hit }}" = "true" ]; then
            npx --yes playwright@1.47.0 install-deps chromium
          else
            npx --yes playwright@1.47.0 install --with-deps chromium
          fi

      - name: Wait for production deploy to reflect new og:image
        if: ${{ github.event.inputs.skip_wait != 'true' }}
        env:
          BASE_URL: https://www.ariaops.co.uk
          TIMEOUT_MS: '1800000'   # 30 min — Lovable publish is manual
          INTERVAL_MS: '30000'
          REPORT_DIR: og-tracking
        run: |
          mkdir -p og-tracking
          node scripts/wait-for-deploy.mjs

      - name: Run Google Images tracker
        id: tracker
        env:
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          REPORT_DIR: og-tracking
          # Fail the job if any tracked query has heroLive=false.
          # Override per-run via workflow_dispatch input or change to
          # "regression" to only fail on previously-live queries
          # going dark.
          FAIL_MODE: ${{ github.event.inputs.fail_mode || 'strict' }}
        run: |
          mkdir -p og-tracking
          node scripts/track-google-images.mjs

      # Always append history + commit, even when the tracker fails,
      # so the regression is captured in-repo + on the dashboard.
      - name: Append run to og-tracking/history.md
        if: always()
        env:
          TRIGGER_LABEL: ${{ github.event_name == 'workflow_dispatch' && 'manual post-publish' || format('push {0}', github.sha) }}
        run: node scripts/append-tracker-history.mjs

      - name: Build dashboard payload (public/seo-status/tracker-history.json)
        run: node scripts/build-seo-status.mjs

      - name: Commit updated history + dashboard payload
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add og-tracking/history.md og-tracking/*.json og-tracking/*.csv public/seo-status/tracker-history.json || true
          if git diff --cached --quiet; then
            echo "No history changes to commit."
          else
            git commit -m "chore(seo): post-deploy heroLive snapshot [skip ci]"
            git push
          fi

      - name: Upload tracker artifacts (JSON + CSV)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: og-tracking-${{ github.run_id }}
          path: |
            og-tracking/*.json
            og-tracking/*.csv
            og-tracking/*.html
          if-no-files-found: warn
