name: Security Scan

# Runs the dependency security scan on every build (push + pull request).
# The pipeline FAILS if any new critical-severity advisory is detected, so
# critical supply-chain regressions can never merge or deploy unnoticed.
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies (no scripts)
        run: npm ci --ignore-scripts

      # Generate a CycloneDX SBOM from the EXACT resolved dependency graph
      # (honours package.json "overrides", e.g. the protobufjs >=7.2.5 pin).
      # This SBOM is the source of truth the scan is verified against.
      - name: Generate SBOM (CycloneDX)
        run: |
          mkdir -p sbom
          npx --yes @cyclonedx/cyclonedx-npm@latest \
            --output-format JSON \
            --output-file sbom/bom.cdx.json \
            --omit dev \
            --spec-version 1.5
          echo "Components in SBOM:"
          jq '.components | length' sbom/bom.cdx.json

      - name: Run security scan (fail on critical)
        run: |
          set +e
          JSON_REPORT="$(npm audit --json --audit-level=critical 2>/dev/null)"
          echo "$JSON_REPORT" | jq -r '
            .vulnerabilities // {}
            | to_entries
            | map(.value)
            | map(select(.severity == "critical"))
            | if length == 0 then
                "✅ No critical-severity findings."
              else
                "❌ Critical findings detected:\n" +
                (map("• \(.name) (affected: \(.range))") | join("\n"))
              end
          '

          # Count critical vulnerabilities and fail the pipeline if any exist.
          CRITICAL_COUNT="$(echo "$JSON_REPORT" | jq '
            [.vulnerabilities // {} | to_entries[] | .value
             | select(.severity == "critical")] | length
          ')"

          echo "critical_count=$CRITICAL_COUNT"

          # Cross-check the audit against the resolved graph captured in the SBOM:
          # confirm protobufjs is pinned to the patched version (>=7.2.5).
          PROTOBUF_VERSIONS="$(jq -r '
            [.components[]? | select(.name == "protobufjs") | .version] | unique | join(", ")
          ' sbom/bom.cdx.json)"
          echo "protobufjs resolved in SBOM: ${PROTOBUF_VERSIONS:-<not present>}"

          if [ "${CRITICAL_COUNT:-0}" -gt 0 ]; then
            echo "::error::Security scan failed — $CRITICAL_COUNT critical finding(s) detected. See SBOM artifact for the resolved graph."
            exit 1
          fi
          echo "Security scan passed — no critical findings (verified against SBOM)."

      # Attach the SBOM to the scan results so reviewers can verify findings
      # against the exact resolved dependency graph that was scanned.
      - name: Attach SBOM to scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-sbom
          path: sbom/bom.cdx.json
          retention-days: 90

