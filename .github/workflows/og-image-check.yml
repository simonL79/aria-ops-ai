name: OG image check

on:
  push:
    branches: [main]
    paths:
      - 'public/og/**'
      - 'src/components/seo/**'
      - 'src/pages/simon-lindsay/**'
      - 'scripts/check-og-images.mjs'
      - '.github/workflows/og-image-check.yml'
  schedule:
    - cron: '0 6 * * *'  # daily 06:00 UTC
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL to check (defaults to production)'
        required: false
        default: 'https://www.ariaops.co.uk'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node_version: '20'
      - name: Verify hero og:image / twitter:image
        env:
          BASE_URL: ${{ github.event.inputs.base_url || 'https://www.ariaops.co.uk' }}
        run: node scripts/check-og-images.mjs
