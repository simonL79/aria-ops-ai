version: 2
updates:
  # npm / JavaScript dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
      include: "scope"
    # Group low-risk updates so they don't flood the PR list; security
    # updates always come through regardless of grouping.
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # Keep the GitHub Actions used by the workflows above patched too.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/London"
    labels:
      - "ci"
    commit-message:
      prefix: "ci"
